<html lang="en">
<head>

<title>SSC MOCK TEST PORTAL</title>

<style>
    :root {
        --bg: #f0f7ff;
        --surface: #ffffff;
        --card: #ffffff;
        --border: #dbeafe;
        --primary: #0284c7;
        --sky: #38bdf8;
        --succ: #059669;
        --err: #dc2626;
        --text: #0f172a;
        --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 50px; }

    .app-header {
        background: var(--surface); border-bottom: 2px solid var(--border); padding: 15px 20px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(2, 132, 199, 0.1);
    }
    .app-header h1 { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--primary); letter-spacing: 2px; cursor: pointer; }
    #timer { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; background: var(--primary); padding: 6px 14px; border-radius: 8px; }

    .screen { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
    .screen.active { display: block; }

    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--primary); cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.2s; font-weight: bold; }
    .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .topic-card {
        background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 25px;
        text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .topic-card:hover { transform: translateY(-5px); border-color: var(--sky); background: #f8fafc; }
    .topic-card h3 { color: var(--primary); font-size: 0.9rem; }

    /* ── Q Card ── */
    .q-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 25px; margin-bottom: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .bookmark-btn { position: absolute; right: 20px; top: 20px; font-size: 1.5rem; cursor: pointer; color: #cbd5e1; transition: 0.2s; }
    .bookmark-btn.active { color: #f59e0b; }

    /* ── Options ── */
    .opt-btn {
        display: block; width: 100%; text-align: left; padding: 14px 18px;
        background: #f1f5f9; border: 1px solid var(--border); border-radius: 10px;
        margin-bottom: 8px; font-size: 0.95rem; transition: 0.2s; color: var(--text);
    }
    /* Locked = no hover/pointer unless unanswered */
    .opt-btn.locked { cursor: not-allowed; }
    .opt-btn.unlocked { cursor: pointer; }
    .opt-btn.unlocked:hover { background: #e0f2fe; border-color: var(--sky); }
    .opt-btn.selected { background: var(--primary); border-color: var(--primary); color: white; font-weight: 600; }

    /* ── Question navigator ── */
    #q-navigator {
        display: flex; flex-wrap: wrap; gap: 6px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; padding: 14px; margin-bottom: 16px;
    }
    .qnav-btn {
        width: 36px; height: 36px; border-radius: 8px;
        border: 1.5px solid var(--border); background: #f1f5f9;
        font-size: 0.72rem; font-weight: 700; cursor: pointer;
        color: var(--muted); transition: 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .qnav-btn.current { border-color: var(--primary); background: var(--primary); color: white; }
    .qnav-btn.answered { border-color: var(--succ); background: #d1fae5; color: #065f46; }
    .qnav-btn.answered.current { background: var(--primary); color: white; border-color: var(--primary); }

    .nav-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; border: none; }
    .btn-next { background: var(--primary); color: white; flex-grow: 1; }
    .btn-submit { background: var(--succ); color: white; }
    .btn-back { background: #94a3b8; color: white; }
    .btn-pdf { background: #7c3aed; color: white; }

    /* ── Analysis ── */
    .sol-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #cbd5e1; }
    .sol-box.correct { border-left-color: var(--succ); background: #ecfdf5; }
    .sol-box.wrong { border-left-color: var(--err); background: #fef2f2; }
    .sol-box.skipped { border-left-color: #94a3b8; }

    .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
    .tag-correct { background: #d1fae5; color: #065f46; }
    .tag-wrong { background: #fee2e2; color: #991b1b; }
    .tag-skipped { background: #f1f5f9; color: #475569; }

    /* all-options list inside analysis */
    .opt-list { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .opt-row { font-size: 0.85rem; padding: 7px 12px; border-radius: 7px; border: 1px solid transparent; }
    .opt-row.is-correct { background: #d1fae5; border-color: #6ee7b7; color: #065f46; font-weight: 600; }
    .opt-row.is-user { background: #fee2e2; border-color: #fca5a5; color: #991b1b; font-weight: 600; }
    .opt-row.is-both { background: #d1fae5; border-color: #6ee7b7; color: #065f46; font-weight: 600; }
    .opt-row.neutral { background: #f8fafc; color: var(--muted); }
</style>
</head>

<div class="app-header">

        <!-- FIX 2: PDF download button -->
        <button class="btn btn-pdf" onclick="app.downloadPDF()">⬇ DOWNLOAD PDF</button>
    </div>
    <div id="analysis-list"></div>
</div>

const app = {

    filterHome(type) {
        const cont = document.getElementById('home-container');
        cont.innerHTML = "";
        document.querySelectorAll('.tab-btn').forEach(b =>
            b.classList.toggle('active', b.innerText.toLowerCase().includes(type))
        );
        if (type === 'topics') {
            Object.keys(this.db).forEach(t => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.innerHTML = `<h3>${t.toUpperCase()}</h3>`;
                card.onclick = () => this.loadTopic(t);
                cont.appendChild(card);
            });
        } else {
            const list = type === 'bookmarks' ? this.bookmarks : this.blunders;
            if (!list.length) { cont.innerHTML = `<p style='color:gray; grid-column:1/-1'>No questions here yet.</p>`; return; }
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML = `<h3>REVIEW ALL (${list.length})</h3>`;
            card.onclick = () => this.startTest(list);
            cont.appendChild(card);
        }
    },

    loadTopic(topic) {
        this.activeTopic = topic;
        this.allQs = this.parse(this.db[topic] || "");
        document.getElementById('active-topic-title').innerText = topic.toUpperCase();
        this.renderSets();
        this.switchScreen('screen-sets');
    },

    parse(raw) {
        if (!raw || raw.trim() === "") return [];
        return raw.trim().split(/Q\.\d+/).filter(b => b.trim()).map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l);
            let qText = "", opts = [], ans = "", exp = "";
            lines.forEach(l => {
                if (l.startsWith('A.')) opts[0] = l.slice(2).trim();
                else if (l.startsWith('B.')) opts[1] = l.slice(2).trim();
                else if (l.startsWith('C.')) opts[2] = l.slice(2).trim();
                else if (l.startsWith('D.')) opts[3] = l.slice(2).trim();
                else if (l.startsWith('Correct Answer:')) ans = l.slice(15).trim().toUpperCase();
                else if (l.startsWith('Exp:')) exp = l.slice(4).trim();
                else qText += l + " ";
            });
            return { q: qText.trim(), opts, correct: {'A':0,'B':1,'C':2,'D':3}[ans.charAt(0)], exp };
        });
    },

    renderSets() {
        const cont = document.getElementById('sets-container');
        cont.innerHTML = this.allQs.length === 0
            ? "<p style='color:gray'>Questions for this topic will be available soon.</p>" : "";
        for (let i = 0; i < this.allQs.length; i += 50) {
            const num = (i / 50) + 1;
            const chunk = this.allQs.slice(i, i + 50);
            const card = document.createElement('div'); card.className = 'topic-card';
            card.innerHTML = `<h3>SET ${num}</h3><p style='font-size:0.75rem;color:var(--muted)'>${chunk.length} Questions</p>`;
            card.onclick = () => this.startTest(chunk);
            cont.appendChild(card);
        }
    },

    startTest(qs) {
        this.testQs = qs; this.userAns = {}; this.idx = 0; this.timer = 900;
        this.switchScreen('screen-test');
        document.getElementById('timer').style.display = 'block';
        this.renderQ();
        this.renderNavigator();
        this.startTimer();
    },

    // ── FIX 1: Question Navigator ──────────────────────────────────────────
    renderNavigator() {
        const nav = document.getElementById('q-navigator');
        nav.innerHTML = '';
        this.testQs.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'qnav-btn' +
                (this.userAns[i] !== undefined ? ' answered' : '') +
                (i === this.idx ? ' current' : '');
            btn.textContent = i + 1;
            btn.onclick = () => { this.idx = i; this.renderQ(); this.renderNavigator(); };
            nav.appendChild(btn);
        });
    },

    renderQ() {
        const q = this.testQs[this.idx];
        document.getElementById('q-text').innerText = `Q.${this.idx + 1}: ${q.q}`;
        document.getElementById('q-bookmark').classList.toggle('active',
            this.bookmarks.some(b => b.q === q.q)
        );

        document.getElementById('options-area').innerHTML = q.opts.map((o, i) => {
            const isSelected = this.userAns[this.idx] === i;
            const selClass = isSelected ? 'selected' : '';
            return `<button class="opt-btn unlocked ${selClass}" onclick="app.select(${i})"><b>${String.fromCharCode(65+i)}.</b> ${o}</button>`;
        }).join('');

        this.renderNavigator();
    },

    toggleBookmark() {
        const q = this.testQs[this.idx];
        const exists = this.bookmarks.findIndex(b => b.q === q.q);
        if (exists > -1) this.bookmarks.splice(exists, 1);
        else this.bookmarks.push(q);
        localStorage.setItem('ssc_favs', JSON.stringify(this.bookmarks));
        this.renderQ();
    },

    // Click same option again → deselect (leave unattempted). Click different → switch.
    select(i) {
        if (this.userAns[this.idx] === i) {
            delete this.userAns[this.idx]; // deselect = unattempted
        } else {
            this.userAns[this.idx] = i;
        }
        this.renderQ();
    },

    next() { if (this.idx < this.testQs.length - 1) { this.idx++; this.renderQ(); } },
    prev() { if (this.idx > 0) { this.idx--; this.renderQ(); } },

    startTimer() {
        clearInterval(this.timerInt);
        this.timerInt = setInterval(() => {
            this.timer--;
            const m = Math.floor(this.timer / 60), s = this.timer % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (this.timer <= 0) this.submit();
        }, 1000);
    },

    submit() {
        clearInterval(this.timerInt);
        this.switchScreen('screen-analysis');
        document.getElementById('timer').style.display = 'none';

        let r = 0, w = 0, s = 0;
        const rows = [];

        // FIX 2: Save attempt to localStorage
        const attemptKey = `ssc_attempt_${Date.now()}`;
        const attemptData = {
            topic: this.activeTopic,
            date: new Date().toLocaleString(),
            answers: this.userAns,
            questions: this.testQs
        };
        localStorage.setItem(attemptKey, JSON.stringify(attemptData));

        const listHtml = this.testQs.map((q, i) => {
            const u = this.userAns[i];
            let statusClass = "skipped", tagLabel = "Skipped";
            if (u === undefined) { s++; }
            else if (u === q.correct) { r++; statusClass = "correct"; tagLabel = "Correct"; }
            else {
                w++; statusClass = "wrong"; tagLabel = "Wrong";
                if (!this.blunders.some(b => b.q === q.q)) this.blunders.push(q);
            }

            // Store for PDF
            rows.push({ q, i, u, statusClass, tagLabel });

            // FIX 4: Show ALL 4 options with proper highlighting
            const optsHtml = q.opts.map((opt, oi) => {
                let cls = 'neutral';
                if (oi === q.correct && u !== undefined && oi === u) cls = 'is-both';   // user correct
                else if (oi === q.correct) cls = 'is-correct';                           // correct not chosen
                else if (u !== undefined && oi === u) cls = 'is-user';                   // wrong choice

                const label = oi === q.correct
                    ? (u !== undefined && oi === u ? '✓ Your answer (Correct)' : '✓ Correct Answer')
                    : (u !== undefined && oi === u ? '✗ Your Answer' : '');
                const suffix = label ? ` <span style="font-size:0.7rem; opacity:0.85;">${label}</span>` : '';
                return `<div class="opt-row ${cls}"><b>${String.fromCharCode(65+oi)}.</b> ${opt}${suffix}</div>`;
            }).join('');

            return `<div class="sol-box ${statusClass}">
                <span class="status-tag tag-${statusClass}">${tagLabel}</span>
                <p><b>Q.${i+1}</b> ${q.q}</p>
                <div class="opt-list">${optsHtml}</div>
                ${q.exp ? `<p style="margin-top:10px; font-size:0.82rem; color:var(--muted)"><b>Exp:</b> ${q.exp}</p>` : ''}
            </div>`;
        }).join('');

        localStorage.setItem('ssc_errs', JSON.stringify(this.blunders));

        const finalScore = (r * 1) - (w * 0.33);
        this.lastResult = { r, w, s, finalScore, rows, topic: this.activeTopic, date: new Date().toLocaleString() };

        document.getElementById('score-card').innerHTML = `
            <h1 style="font-size:2.5rem; color:var(--primary); font-family:'Orbitron';">${finalScore.toFixed(2)}</h1>
            <p style="margin-top:8px;">Correct: <b style="color:var(--succ)">${r}</b> &nbsp;|&nbsp; Wrong: <b style="color:var(--err)">${w}</b> &nbsp;|&nbsp; Skipped: <b>${s}</b></p>
            <p style="font-size:0.75rem; color:var(--muted); margin-top:4px;">${this.lastResult.date}</p>`;
        document.getElementById('analysis-list').innerHTML = listHtml;
    },

    // FIX 2: Download PDF of attempt
    downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        const res = this.lastResult;
        if (!res) { alert('No result to export yet.'); return; }

        const pageW = 210, margin = 15, lineH = 6;
        let y = margin;

        const write = (text, size = 10, style = 'normal', color = [15, 23, 42]) => {
            doc.setFontSize(size).setFont('helvetica', style).setTextColor(...color);
            const lines = doc.splitTextToSize(String(text), pageW - margin * 2);
            lines.forEach(line => {
                if (y > 280) { doc.addPage(); y = margin; }
                doc.text(line, margin, y);
                y += lineH;
            });
        };

        const gap = (n = 3) => { y += n; };

        // Header
        doc.setFillColor(2, 132, 199);
        doc.rect(0, 0, 210, 28, 'F');
        doc.setTextColor(255, 255, 255).setFontSize(16).setFont('helvetica', 'bold');
        doc.text('SSC MOCK TEST — RESULT SHEET', margin, 12);
        doc.setFontSize(9).setFont('helvetica', 'normal');
        doc.text(`Topic: ${res.topic || 'Mixed'} | Date: ${res.date}`, margin, 20);
        y = 35;

        // Score summary box
        doc.setFillColor(240, 247, 255);
        doc.rect(margin, y, pageW - margin * 2, 22, 'F');
        doc.setTextColor(2, 132, 199).setFontSize(20).setFont('helvetica', 'bold');
        doc.text(`Score: ${res.finalScore.toFixed(2)}`, margin + 5, y + 12);
        doc.setFontSize(9).setTextColor(15, 23, 42).setFont('helvetica', 'normal');
        doc.text(`Correct: ${res.r}   Wrong: ${res.w}   Skipped: ${res.s}`, margin + 5, y + 19);
        y += 28; gap();

        // Questions
        res.rows.forEach(({ q, i, u, statusClass, tagLabel }) => {
            if (y > 265) { doc.addPage(); y = margin; }

            // Status bar
            const barColor = statusClass === 'correct' ? [5, 150, 105] : statusClass === 'wrong' ? [220, 38, 38] : [148, 163, 184];
            doc.setFillColor(...barColor);
            doc.rect(margin, y, 3, 5, 'F');
            doc.setFontSize(7).setFont('helvetica', 'bold').setTextColor(...barColor);
            doc.text(tagLabel.toUpperCase(), margin + 5, y + 4);
            y += 7;

            // Question text
            write(`Q.${i+1}: ${q.q}`, 9, 'bold');
            gap(1);

            // Options
            q.opts.forEach((opt, oi) => {
                const label = String.fromCharCode(65 + oi);
                const isCorrect = oi === q.correct;
                const isUser = u !== undefined && oi === u;
                let prefix = `${label}. `;
                let sfx = '';
                if (isCorrect && isUser) sfx = ' ✓ (Your answer - Correct)';
                else if (isCorrect) sfx = ' ✓ Correct Answer';
                else if (isUser) sfx = ' ✗ Your Answer';

                const color = isCorrect ? [5, 150, 105] : isUser ? [220, 38, 38] : [100, 116, 139];
                doc.setFontSize(8).setFont('helvetica', isCorrect || isUser ? 'bold' : 'normal').setTextColor(...color);
                const lines = doc.splitTextToSize(prefix + opt + sfx, pageW - margin * 2 - 5);
                lines.forEach(line => {
                    if (y > 280) { doc.addPage(); y = margin; }
                    doc.text(line, margin + 5, y); y += 5.5;
                });
            });

            if (q.exp) {
                gap(1);
                doc.setFontSize(7.5).setFont('helvetica', 'italic').setTextColor(100, 116, 139);
                const expLines = doc.splitTextToSize('Explanation: ' + q.exp, pageW - margin * 2 - 5);
                expLines.forEach(line => {
                    if (y > 280) { doc.addPage(); y = margin; }
                    doc.text(line, margin + 5, y); y += 5;
                });
            }
            gap(4);
            // Separator
            doc.setDrawColor(219, 234, 254);
            doc.line(margin, y - 2, pageW - margin, y - 2);
        });

        doc.save(`SSC_Result_${(res.topic || 'Mock').replace(/\s+/g, '_')}_${Date.now()}.pdf`);
    },

    showHome() {
        this.filterHome('topics');
        this.switchScreen('screen-home');
        clearInterval(this.timerInt);
        document.getElementById('timer').style.display = 'none';
    },

    switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }
};

app.init();
</script>
</body>
</html>
