<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC MOCK TEST PORTAL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #f0f7ff; 
        --surface: #ffffff; 
        --card: #ffffff; 
        --border: #dbeafe;
        --primary: #0284c7; 
        --sky: #38bdf8; 
        --succ: #059669; 
        --err: #dc2626;
        --warn: #f59e0b;
        --text: #0f172a; 
        --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 50px; }

    .app-header {
        background: var(--surface); border-bottom: 2px solid var(--border); padding: 15px 20px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(2, 132, 199, 0.1);
    }
    .app-header h1 { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--primary); letter-spacing: 2px; cursor: pointer; }
    #timer { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; background: var(--primary); padding: 6px 14px; border-radius: 8px; }

    .screen { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .screen.active { display: block; }

    /* TEST SCREEN LAYOUT */
    .test-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
    @media (max-width: 900px) { .test-container { grid-template-columns: 1fr; } }

    /* SIDEBAR GRID */
    .nav-sidebar { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 15px; position: sticky; top: 85px; height: fit-content; }
    .status-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; font-size: 0.7rem; font-weight: bold; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 2px; }
    
    .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .nav-btn { aspect-ratio: 1; border: 1px solid var(--border); background: #f8fafc; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
    .nav-btn.current { border: 2px solid var(--primary); box-shadow: 0 0 5px var(--sky); }
    .nav-btn.answered { background: var(--succ); color: white; border-color: var(--succ); }
    .nav-btn.visited { background: var(--err); color: white; border-color: var(--err); }
    .nav-btn.marked { background: var(--warn); color: white; border-color: var(--warn); }

    /* MATCHING UI */
    .matching-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f0f7ff; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid var(--border); }
    .match-col h4 { font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .match-line { font-size: 0.9rem; margin-bottom: 5px; display: flex; gap: 8px; }

    /* TABS & CARDS */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--primary); cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; }
    .tab-btn.active { background: var(--primary); color: white; }

    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .topic-card { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: 0.2s; }
    .topic-card:hover { transform: translateY(-5px); border-color: var(--sky); }

    .q-card { background: white; border: 2px solid var(--border); border-radius: 14px; padding: 25px; margin-bottom: 15px; position: relative; }
    .opt-btn { display: block; width: 100%; text-align: left; padding: 14px 18px; background: #f1f5f9; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 0.95rem; }
    .opt-btn.selected { background: var(--primary); color: white; font-weight: 600; }

    .nav-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; border: none; }
    .btn-next { background: var(--primary); color: white; flex-grow: 1; }
    .btn-mark { background: var(--warn); color: white; }
    .btn-back { background: #94a3b8; color: white; }
</style>
</head>
<body>

<div class="app-header">
    <h1 onclick="app.showHome()">THE SSC SCHOLARS</h1>
    <div id="timer" style="display:none;">15:00</div>
</div>

<div class="screen active" id="screen-home">

        <button class="tab-btn active" onclick="app.filterHome('topics')">TOPICS</button>
        <button class="tab-btn" onclick="app.filterHome('bookmarks')">SAVED</button>
        <button class="tab-btn" onclick="app.filterHome('blunders')">MISTAKES</button>
    </div>
    <div id="home-container" class="topic-grid"></div>
</div>

<div class="screen" id="screen-sets">

    <h2 id="active-topic-title" style="font-family:'Orbitron'; font-size:1rem; color:var(--primary); margin-bottom:15px;"></h2>
    <div id="sets-container" class="topic-grid"></div>

<div class="screen" id="screen-test">

                <div class="legend-item"><div class="dot" style="background:#f8fafc; border:1px solid #ddd"></div> Not Seen</div>
            </div>
            <div id="nav-grid" class="nav-grid"></div>
            <button class="btn btn-next" style="width:100%; margin-top:20px; background:var(--err)" onclick="app.submit()">FINISH TEST</button>
        </div>
    </div>
</div>

<div class="screen" id="screen-analysis">
    <div id="score-card" style="background:white; padding:20px; border-radius:12px; text-align:center; margin-bottom:20px; border:2px solid var(--border)"></div>
    <button class="btn btn-next" style="width:100%; margin-bottom:20px;" onclick="app.showHome()">BACK TO HOME</button>
    <div id="analysis-list"></div>
</div>

const app = {
    db: MASTER_DATA,
    activeTopic: "", allQs: [], testQs: [], userAns: {}, visited: {}, marked: {}, idx: 0,
    timer: 900, timerInt: null,
    bookmarks: JSON.parse(localStorage.getItem('ssc_favs') || '[]'),
    blunders: JSON.parse(localStorage.getItem('ssc_errs') || '[]'),

    init() { this.filterHome('topics'); },

    filterHome(type) {
        const cont = document.getElementById('home-container');
        cont.innerHTML = "";
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(type)));
        
        if(type === 'topics') {
            Object.keys(this.db).forEach(t => {
                const card = document.createElement('div'); card.className = 'topic-card';
                card.innerHTML = `<h3>${t.toUpperCase()}</h3>`;
                card.onclick = () => this.loadTopic(t);
                cont.appendChild(card);
            });
        }
    },

    loadTopic(topic) {
        this.activeTopic = topic;
        this.allQs = this.parse(this.db[topic] || "");
        document.getElementById('active-topic-title').innerText = topic.toUpperCase();
        this.renderSets();
        this.switchScreen('screen-sets');
    },

    parse(raw) {
        if (!raw) return [];
        return raw.trim().split(/Q\.\d+/).filter(b => b.trim()).map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l);
            let qText = "", opts = [], ans = "", colA = [], colB = [], isMatch = false;
            let mode = "text";

            lines.forEach(l => {
                if(l.startsWith('COLUMN A:')) { mode="colA"; isMatch=true; return; }
                if(l.startsWith('COLUMN B:')) { mode="colB"; return; }
                if(l.match(/^[A-D]\./)) mode="opts";
                if(l.startsWith('Correct Answer:')) mode="ans";

                if(mode==="text") qText += l + " ";
                else if(mode==="colA") colA.push(l);
                else if(mode==="colB") colB.push(l);
                else if(mode==="opts") opts[l.charCodeAt(0)-65] = l.slice(2).trim();
                else if(mode==="ans") ans = l.slice(15).trim().toUpperCase();
            });
            return { q: qText.trim(), opts, correct: {'A':0,'B':1,'C':2,'D':3}[ans.charAt(0)], isMatch, colA, colB };
        });
    },

    renderSets() {
        const cont = document.getElementById('sets-container');
        cont.innerHTML = this.allQs.length === 0 ? "<p>Coming soon...</p>" : "";
        for (let i = 0; i < this.allQs.length; i += 50) {
            const chunk = this.allQs.slice(i, i + 50);
            const card = document.createElement('div'); card.className = 'topic-card';
            card.innerHTML = `<h3>SET ${(i/50)+1}</h3><p>${chunk.length} Questions</p>`;
            card.onclick = () => this.startTest(chunk);
            cont.appendChild(card);
        }
    },

    startTest(qs) {
        this.testQs = qs; this.userAns = {}; this.visited = {}; this.marked = {}; this.idx = 0;
        this.switchScreen('screen-test');
        document.getElementById('timer').style.display = 'block';
        this.renderNavGrid();
        this.renderQ();
        this.startTimer();
    },

    renderQ() {
        const q = this.testQs[this.idx];
        this.visited[this.idx] = true;
        document.getElementById('q-text').innerText = `Q.${this.idx + 1}: ${q.q}`;
        
        const mArea = document.getElementById('match-container');
        mArea.innerHTML = "";
        if(q.isMatch) {
            let h = `<div class="matching-box"><div class="match-col"><h4>Column A</h4>`;
            q.colA.forEach(it => h += `<div class="match-line">${it}</div>`);
            h += `</div><div class="match-col"><h4>Column B</h4>`;
            q.colB.forEach(it => h += `<div class="match-line">${it}</div>`);
            mArea.innerHTML = h + `</div></div>`;
        }

        document.getElementById('options-area').innerHTML = q.opts.map((o, i) => 
            `<button class="opt-btn ${this.userAns[this.idx] === i ? 'selected' : ''}" onclick="app.select(${i})"><b>${String.fromCharCode(65+i)}.</b> ${o}</button>`
        ).join('');
        this.updateNav();
    },

    renderNavGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        this.testQs.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn'; btn.id = `nb-${i}`; btn.innerText = i + 1;
            btn.onclick = () => { this.idx = i; this.renderQ(); };
            grid.appendChild(btn);
        });
    },

    updateNav() {
        this.testQs.forEach((_, i) => {
            const b = document.getElementById(`nb-${i}`);
            b.classList.remove('current', 'answered', 'visited', 'marked');
            if(i === this.idx) b.classList.add('current');
            if(this.userAns[i] !== undefined) b.classList.add('answered');
            else if(this.marked[i]) b.classList.add('marked');
            else if(this.visited[i]) b.classList.add('visited');
        });
    },

    select(i) { this.userAns[this.idx] = i; this.renderQ(); },
    toggleMark() { this.marked[this.idx] = !this.marked[this.idx]; this.renderQ(); },
    next() { if(this.idx < this.testQs.length-1) { this.idx++; this.renderQ(); } },
    prev() { if(this.idx > 0) { this.idx--; this.renderQ(); } },

    startTimer() {
        clearInterval(this.timerInt); this.timer = 900;
        this.timerInt = setInterval(() => {
            this.timer--;
            let m=Math.floor(this.timer/60), s=this.timer%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(this.timer <= 0) this.submit();
        }, 1000);
    },

    submit() {
        clearInterval(this.timerInt); this.switchScreen('screen-analysis');
        document.getElementById('timer').style.display='none';
        let r=0, w=0, s=0;
        let html = this.testQs.map((q, i) => {
            const u = this.userAns[i];
            let cls = "skipped";
            if(u === q.correct) { r++; cls="correct"; }
            else if(u !== undefined) { w++; cls="wrong"; } else s++;
            return `<div class="sol-box ${cls}"><p><b>Q.${i+1}</b> ${q.q}</p><p style="color:var(--succ)">Correct: ${q.opts[q.correct]}</p></div>`;
        }).join('');
        document.getElementById('score-card').innerHTML = `<h1>Score: ${(r - w*0.33).toFixed(2)}</h1><p>Correct: ${r} | Wrong: ${w}</p>`;
        document.getElementById('analysis-list').innerHTML = html;
    },

    showHome() { this.filterHome('topics'); this.switchScreen('screen-home'); clearInterval(this.timerInt); },
    switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
};
app.init();
</script>
